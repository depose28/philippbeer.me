<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Monitor body -->
  <rect x="3" y="4" width="26" height="20" rx="3" fill="#c4bba6" stroke="#a89e88" stroke-width="1"/>
  <!-- Screen bezel -->
  <rect x="5" y="6" width="22" height="16" rx="2" fill="#2e2a26"/>
  <!-- CRT screen -->
  <rect x="7" y="8" width="18" height="12" rx="1" fill="#1c1c18"/>
  <!-- Amber cursor line -->
  <rect x="9" y="12" width="8" height="2" rx="0.5" fill="#ffb347" opacity="0.9"/>
  <!-- Blinking cursor -->
  <rect x="18" y="12" width="2" height="2" rx="0.5" fill="#ffb347">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Screen glow -->
  <rect x="7" y="8" width="18" height="12" rx="1" fill="#ffb347" opacity="0.04"/>
  <!-- Stand -->
  <rect x="12" y="24" width="8" height="2" rx="0.5" fill="#b8ad96"/>
  <!-- Base -->
  <rect x="9" y="26" width="14" height="2" rx="1" fill="#c4bba6" stroke="#a89e88" stroke-width="0.5"/>
</svg>
